name: Deploy Firebase Rules and Functions

on:
  push:
    branches:
      - main
    paths:
      - 'firebase/**'
      - '.github/workflows/firebase-deploy.yml'

jobs:
  deploy_rules_and_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUCOM_INVENTORY }}'

      - name: Deploy Firestore and Storage Rules
        run: firebase deploy --only firestore:rules,storage --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        
      # 若後續有需要自動部署 Functions，可取消下方程式碼註解
      # - name: Install Functions Dependencies
      #   run: cd firebase/functions && npm ci
      # - name: Deploy Cloud Functions
      #   run: firebase deploy --only functions --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
